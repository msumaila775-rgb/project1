<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <article class="card">
            <div class="card-image">
                <img src="icons/card.png" alt="article">
            </div>

            <div class="class-content">
                <div class="badge">Learning</div>
                <time datetime="22-06-2026">Published 22-06-2026</time>
                <h2><a href="#">HTML & CSS foundations</a></h2>
                <p>These languages are the backbone of <br>
                    website, designing structure, content, and <br>
                    presentation.
                </p>
                <footer class="author">
                    <img src="icons/avatar.JPG" alt="avatar" class="avatar">
                    <div class="author-name">Sumaila Mohammed Suadik</div>
                </footer>
            </div>
        </article>
    </main>
</body>
</html>
