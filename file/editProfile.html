<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | WebPlatform</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">WebPlatform</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="faq.html" class="nav-link">FAQ</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
                <li><a href="register.html" class="nav-link btn-primary">Register</a></li>
            </ul>
        </div>
    </nav>

    <div id="editProfile" class="page active">
        <section class="auth-container">
            <div class="auth-form">
                <h2>Edit Your Profile</h2>
                <form id="editProfileForm">
                    <div class="form-group">
                        <label for="editFirstName">First Name:</label>
                        <input type="text" id="editFirstName" required>
                    </div>

                    <div class="form-group">
                        <label for="editLastName">Last Name:</label>
                        <input type="text" id="editLastName" required>
                    </div>

                    <div class="form-group">
                        <label for="editEmail">Email Address:</label>
                        <input type="email" id="editEmail" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                    <div id="editMessage" class="message"></div>
                </form>
            </div>
        </section>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 WebPlatform. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
