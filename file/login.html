<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WebPlatform</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">WebPlatform</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="faq.html" class="nav-link">FAQ</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="login.html" class="nav-link active">Login</a></li>
                <li><a href="register.html" class="nav-link btn-primary">Register</a></li>
            </ul>
        </div>
    </nav>

    <div id="login" class="page active">
        <section class="auth-container">
            <div class="auth-form">
                <h2>Login to Your Account</h2>
                <form id="loginForm" action="dashboard.html" method="get">
                    <div class="form-group">
                        <label for="loginEmail">Email Address:</label>
                        <input type="email" id="loginEmail" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Login</button>
                    <div id="loginMessage" class="message"></div>
                </form>

                <p class="auth-link">Don't have an account? Register <a href="register.html">here</a></p>
            </div>

            <div id="userInfo" class="user-info" style="display: none;">
                <h3>Welcome Back!</h3>
                <p id="userDetails"></p>
                <a href="index.html" class="btn btn-secondary">Go to Home</a>
            </div>
        </section>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 WebPlatform. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
