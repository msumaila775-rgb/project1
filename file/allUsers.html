<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users | WebPlatform</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">WebPlatform</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="faq.html" class="nav-link">FAQ</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
                <li><a href="register.html" class="nav-link btn-primary">Register</a></li>
            </ul>
        </div>
    </nav>

    <div id="allUsers" class="page active">
        <section class="users-container">
            <div class="container">
                <h1>Registered Users</h1>
                <p class="intro-text">View all registered users on the platform</p>

                <div class="users-table-wrapper">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Email</th>
                                <th>Registered</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem;">Loading users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <a href="dashboard.html" class="btn btn-primary" style="margin-top: 2rem; display: inline-block;">Back to Dashboard</a>
            </div>
        </section>
    </div>

            </ul>
        </div>
