<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-background">
        <span class="card-background-1"></span>
        <span class="card-background-2"></span>
        <span class="card-background-3"></span>
        <span class="card-background-4"></span>
      </div>
      <form>
        <h2>Welcome Back</h2>
        <div class="form-page">
          <div class="input-group">
            <label for="username">
              <img 
                src="ICON/User.svg" 
                alt="username" 
              />
            </label>
            <input 
              type="text" 
              id="username" 
              placeholder="Username" 
              required 
            />
          </div>

          <div class="input-group">
            <label for="password">
              <img src="ICON/Password.svg" alt="password" />
            </label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <button 
            type="submit" 
            class="login-btn">
            LOGIN NOW
          </button>
        </div>
        <div class="social-login">
          <p>Log in Via</p>
          <div class="icon">
            <img 
              src="ICON/instagram.svg" 
              alt="instagram" 
            />
            <img 
              src="ICON/facebook.svg" 
              alt="facebook" 
            />
            <img 
              src="ICON/twitter.svg" 
              alt="twitter" 
            />
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
